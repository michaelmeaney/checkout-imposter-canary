name: Checkout Imposter Commit Canary
description: Harmless canary action demonstrating that SHA pinning is not repository provenance.

runs:
  using: composite
  steps:
    - name: Emit canary warning
      shell: bash
      run: |
        echo "::warning title=Imposter commit canary::This action should not have executed. The workflow used a SHA that was not proven to belong to the declared action repository."
